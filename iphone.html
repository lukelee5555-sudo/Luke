<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17233b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>모의면접 분석 대시보드</title>
<style>
html,body{margin:0;min-height:100%;background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif}
.loading{min-height:100vh;display:grid;place-items:center;padding:24px;color:#17233b;text-align:center}
.spinner{width:34px;height:34px;border:4px solid #dce3f2;border-top-color:#2d5bd6;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 14px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading"><div><div class="spinner"></div><strong>모의면접 대시보드를 불러오는 중입니다.</strong><p style="font-size:13px;color:#6b7585">잠시 후 아이폰 화면에 맞는 세로 스크롤 화면이 열립니다.</p></div></div>
<script>
(async()=>{
 try{
  if(!('DecompressionStream' in window)) throw new Error('Safari를 최신 버전으로 업데이트해 주세요.');
  const names=['00','01','02','03','04','05','06','07','08','09'];
  const parts=await Promise.all(names.map(n=>fetch('./chunks/'+n+'.txt',{cache:'no-store'}).then(r=>{
    if(!r.ok) throw new Error('앱 데이터를 불러오지 못했습니다.');
    return r.text();
  })));
  const raw=atob(parts.join('').replace(/\s/g,''));
  const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const html=await new Response(stream).text();
  document.open();document.write(html);document.close();
 }catch(e){
  document.body.innerHTML='<div class="loading"><div><strong>실행하지 못했습니다.</strong><p style="font-size:13px;color:#6b7585">'+e.message+'</p></div></div>';
 }
})();
</script>
</body>
</html>
